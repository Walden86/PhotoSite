<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BetűKaland - hiányzó betű</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #4DA6FF;
      --primary-strong: #1E88E5;
      --ok: #4CD964;
      --bad: #FF4D4F;
      --bg1: #F3F8FF;
      --bg2: #EAF4FF;
      --cloud-bg: url("./background.png");
      --card: #FFFFFF;
      --text: #173E5D;
      --muted: #4F6A81;
      --shadow: 0 14px 34px rgba(5, 52, 89, 0.14);
    }

    * { box-sizing: border-box; }

    html {
      margin: 0;
      min-height: 100%;
      background-color: var(--bg1);
      background-image: linear-gradient(to bottom, var(--bg1), var(--bg2)), var(--cloud-bg);
      background-repeat: no-repeat, repeat;
      background-size: cover, auto;
      background-position: center top, left top;
    }

    body {
      margin: 0;
      min-height: 100%;
      font-family: "Nunito", "Segoe UI", sans-serif;
      color: var(--text);
      background: transparent;
    }

    .app {
      width: min(1160px, 96vw);
      margin: 18px auto;
      border-radius: 42px;
      background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(235,247,255,0.95));
      border: 12px solid rgba(230, 245, 255, 0.95);
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .stage-card {
      border-radius: 34px;
      background: linear-gradient(180deg, #BFE6FF 0%, #E8F6FF 38%, #DDF1FF 100%);
      border: 3px solid #9FD7FA;
      padding: 16px;
      display: grid;
      gap: 14px;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.7);
    }

    .badges {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
      align-items: center;
    }

    .badge {
      padding: 10px 18px;
      font-weight: 800;
      font-size: 17px;
      color: #0E4E82;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 104px;
      border: none;
      box-shadow: none;
      overflow: visible;
    }

    #level-badge {
      background-image: url("./status_buttons.png");
      background-repeat: no-repeat;
      background-size: 166% 392%;
      background-position: 49% 12%;
      padding-left: 124px;
      padding-right: 44px;
      color: #1a4d85;
    }

    #score-badge {
      background-image: url("./status_buttons.png");
      background-repeat: no-repeat;
      background-size: 164% 401%;
      background-position: 49% 12%;
      padding-left: 124px;
      padding-right: 44px;
      color: #684f16;
    }

    #streak-badge {
      background-image: url("./status_buttons.png");
      background-repeat: no-repeat;
      background-size: 164% 401%;
      background-position: 49% 12%;
      padding-left: 124px;
      padding-right: 44px;

      color: #684f16;
    }

    #score-badge { background-position: 48% 50%; }
    #streak-badge { background-position: 48% 85%; }

    .badge .status-text {
      font-size: clamp(24px, 2.2vw, 34px);
      font-weight: 900;
      text-shadow: 0 1px 0 rgba(255,255,255,0.45);
      line-height: 1;
    }

    .asset-img {
      width: 22px;
      height: 22px;
      object-fit: contain;
      display: inline-block;
      vertical-align: middle;
      flex: 0 0 auto;
    }

    .asset-fallback {
      font-size: 22px;
      line-height: 1;
      display: inline-block;
    }

    .asset-fallback.hidden {
      display: none;
    }

    .word-row {
      display: grid;
      grid-template-columns: minmax(180px, 230px) 1fr;
      gap: 12px;
      align-items: stretch;
    }

    .illustration-box {
      background: linear-gradient(180deg, #EAF6FF, #D8EEFF);
      border-radius: 28px;
      padding: 22px;
      text-align: center;
      border: 2px solid #C9E6FF;
      box-shadow: inset 0 4px 10px rgba(0,0,0,0.04);
      color: var(--muted);
      display: grid;
      background-position: 10%, 10%;
      place-items: center;
      overflow: hidden;
    }

    .illustration-box .icon {
      font-size: 40px;
      line-height: 1;
      display: block;
      margin-bottom: 8px;
    }

    .illustration-box .asset-img {
      width: min(180px, 40vw);
      height: auto;
      margin-bottom: 8px;
      transform: scale(1.3);
      transform-origin: center center;
    }

    .word {
      border-radius: 28px;
      border: 2px solid #D3EAFB;
      background: linear-gradient(180deg, #FCFEFF, #F2F9FF);
      min-height: 170px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(56px, 11vw, 86px);
      font-weight: 900;
      letter-spacing: 4px;
      text-align: center;
      overflow-wrap: anywhere;
      padding: 8px;
    }

    #missing-letter {
      color: var(--primary-strong);
      text-decoration: underline;
      text-decoration-thickness: 4px;
      min-width: 1.1em;
      display: inline-block;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .letter-button {
      font-size: clamp(40px, 8vw, 52px);
      font-weight: 900;
      border: 0;
      border-radius: 30px;
      padding: 24px 0;
      color: #fff;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.35), rgba(255,255,255,0.0) 38%),
        linear-gradient(180deg, #4ec2ff 0%, #2799f2 48%, #1578d6 100%);
      border: 3px solid #77cfff;
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.55),
        inset 0 -3px 0 rgba(9,95,170,0.35),
        0 10px 18px rgba(0,0,0,0.14);
      cursor: pointer;
      transition: all 0.2s ease;
      min-height: 112px;
    }

    .letter-button:hover,
    .letter-button:focus-visible {
      transform: translateY(-4px) scale(1.01);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.55),
        inset 0 -3px 0 rgba(9,95,170,0.35),
        0 14px 24px rgba(0,0,0,0.17);
      outline: none;
    }

    .letter-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .letter-button.correct { background: var(--ok) !important; }
    .letter-button.wrong { background: var(--bad) !important; }

    #feedback {
      min-height: 30px;
      text-align: center;
      font-size: clamp(24px, 3.2vw, 52px);
      font-weight: 800;
      color: #1B4E77;
    }

    .feedback-good { color: var(--ok) !important; }
    .feedback-bad { color: var(--bad) !important; }

    .progress-wrap {
      border: 2px solid #D0E7FA;
      background: linear-gradient(180deg, #F6FCFF, #EAF6FF);
      border-radius: 24px;
      padding: 10px 12px;
      display: grid;
      gap: 8px;
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      font-weight: 900;
      color: #174265;
      margin-bottom: 2px;
      font-size: 24px;
    }

    .progress-bar {
      height: 22px;
      border-radius: 10px;
      background: #E6F2FF;
      overflow: hidden;
      border: 2px solid #CFE6FF;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(135deg, #4CD964, #1E88E5);
      transition: width 0.25s ease;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .picker, .control {
      border-radius: 999px;
      border: 2px solid #BDD9F3;
      background: linear-gradient(180deg, #F7FDFF, #E0F2FF);
      color: #0A4F84;
      font-size: 16px;
      font-weight: 800;
      padding: 14px 16px;
      min-height: 74px;
    }

    .picker {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 18px;
    }

    .picker select {
      border: 1px solid #98C8EF;
      border-radius: 999px;
      background: #fff;
      color: #0A4F84;
      font-size: 16px;
      font-weight: 700;
      padding: 8px 14px;
    }

    .badge.mode-hidden {
      display: none;
    }

    .control { cursor: pointer; }
    .control:hover,
    .control:focus-visible { background: #E2F1FF; outline: none; }
    .control:disabled { opacity: 0.55; cursor: not-allowed; }

    .confetti {
      position: fixed;
      width: 10px;
      height: 14px;
      border-radius: 2px;
      top: -20px;
      z-index: 9999;
      animation: fall linear forwards;
      pointer-events: none;
    }

    .shake { animation: shake 0.45s ease; }
    .word-pop { animation: pop 0.28s ease; }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(7, 33, 53, 0.4);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 10000;
    }

    .modal.show { display: flex; }

    .modal-card {
      width: min(420px, 92vw);
      background: #fff;
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 18px;
      text-align: center;
    }

    .modal-card h2 { margin: 0 0 8px; font-size: 26px; }
    .modal-card p { margin: 8px 0; color: #285075; font-size: 18px; font-weight: 700; }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      50% { transform: translateX(6px); }
      75% { transform: translateX(-5px); }
      100% { transform: translateX(0); }
    }

    @keyframes pop {
      0% { transform: scale(1); }
      60% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    @keyframes fall {
      to { transform: translateY(110vh) rotate(720deg); opacity: 0.9; }
    }

    .advanced-panel {
      margin-top: 2px;
    }

    .advanced-panel summary {
      cursor: pointer;
      color: #1E5D90;
      font-weight: 700;
      font-size: 14px;
      text-align: center;
      list-style: none;
      user-select: none;
    }

    .advanced-panel summary::-webkit-details-marker {
      display: none;
    }

    .advanced-controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      opacity: 0.82;
      margin-top: 8px;
    }

    @media (max-width: 980px) {
      .word-row { grid-template-columns: 1fr; }
      .feedback { font-size: 32px; }
      .badges { grid-template-columns: 1fr; }
      .controls { grid-template-columns: 1fr; }
      .buttons { grid-template-columns: 1fr; }
      .progress-top { justify-content: center; }
      .advanced-controls { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app" aria-live="polite">
    <section class="stage-card">
    <header class="badges">
      <div class="badge" id="level-badge">
        <span id="level-badge-text" class="status-text">1. osztály</span>
      </div>
      <div class="badge" id="score-badge">
        <span id="score-badge-text" class="status-text">0 pont</span>
      </div>
      <div class="badge" id="streak-badge">
        <span id="streak-badge-text" class="status-text">0 sorozat</span>
      </div>
      <div class="badge mode-hidden" id="mode-badge">Mód: Játék</div>
    </header>

    <section class="word-row">
      <section class="illustration-box" aria-label="Illusztráció helye">
        <img class="asset-img" src="./konyv.png" alt="Illusztráció" data-fallback-id="illustration-fallback">
      </section>

      <section class="word" aria-label="Aktuális szó">
        <span id="word-prefix"></span><span id="missing-letter">_</span><span id="word-suffix"></span>
      </section>
    </section>

    <section class="buttons" aria-label="Betű választása">
      <button id="btn-j" class="letter-button" type="button">j</button>
      <button id="btn-ly" class="letter-button" type="button">ly</button>
    </section>

    <section id="feedback">Melyik betű hiányzik?</section>

    <section class="progress-wrap">
      <div class="progress-top">
        <span id="score">⭐ Pontjaid: 0 / 10</span>
        <span id="progress">Kérdés: 0/10</span>
        <span id="combo">Hibátlan sorozat: 0</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </section>

    <section class="controls">
      <label class="picker" for="level-select">Évfolyam:
        <select id="level-select" aria-label="Évfolyam kiválasztása"></select>
      </label>
      <button id="new-round-btn" class="control" type="button">Új kör (10 szó)</button>
      <button id="back-to-game-btn" class="control" type="button" disabled>Vissza játékhoz</button>
    </section>

    <details class="advanced-panel">
      <summary>Továbbiak</summary>
      <section class="advanced-controls">
        <label class="picker" for="age-mode-select">Korcsoport:
          <select id="age-mode-select" aria-label="Korcsoport kiválasztása">
            <option value="kids">6-8 év</option>
            <option value="teens">10-14 év</option>
          </select>
        </label>
        <button id="quiz-btn" class="control" type="button">Kvíz indítása</button>
        <button id="reset-storage-btn" class="control" type="button">Mentés törlése</button>
      </section>
    </details>
    </section>
  </main>

  <section id="quiz-result-modal" class="modal" aria-hidden="true">
    <div class="modal-card">
      <h2>Kvíz vége</h2>
      <p id="quiz-result-line1"></p>
      <p id="quiz-result-line2"></p>
      <button id="quiz-close-btn" class="control" type="button">Rendben</button>
    </div>
  </section>

  <script src="./szavak.js"></script>
  <script>
    const POOL_SIZE = 20;
    const ROUND_SIZE = 10;

    const STORAGE_KEYS = {
      settings: "betukaland.settings",
      progress: "betukaland.progress",
      session: "betukaland.session",
      quizHistory: "betukaland.quizHistory"
    };

    const state = {
      mode: "game",
      currentLevel: 1,
      levelWords: [],
      levelPointer: 0,
      activePoolWords: [],
      activePoolRemaining: [],
      roundWords: [],
      currentQuestionIndex: 0,
      score: 0,
      roundCorrect: 0,
      combo: 0,
      quizCorrect: 0,
      locked: false,
      settings: { ageMode: "kids", selectedGrade: 1, soundOn: false },
      progress: { totalPoints: 0, streakDays: 0, bestStreak: 0, lastPlayedDate: "", byGrade: {} }
    };

    const els = {
      modeBadge: document.getElementById("mode-badge"),
      levelBadge: document.getElementById("level-badge"),
      levelBadgeText: document.getElementById("level-badge-text"),
      scoreBadge: document.getElementById("score-badge"),
      scoreBadgeText: document.getElementById("score-badge-text"),
      streakBadge: document.getElementById("streak-badge"),
      streakBadgeText: document.getElementById("streak-badge-text"),
      wordPrefix: document.getElementById("word-prefix"),
      missingLetter: document.getElementById("missing-letter"),
      wordSuffix: document.getElementById("word-suffix"),
      btnJ: document.getElementById("btn-j"),
      btnLy: document.getElementById("btn-ly"),
      feedback: document.getElementById("feedback"),
      score: document.getElementById("score"),
      progress: document.getElementById("progress"),
      combo: document.getElementById("combo"),
      progressFill: document.getElementById("progress-fill"),
      levelSelect: document.getElementById("level-select"),
      ageModeSelect: document.getElementById("age-mode-select"),
      newRoundBtn: document.getElementById("new-round-btn"),
      quizBtn: document.getElementById("quiz-btn"),
      backToGameBtn: document.getElementById("back-to-game-btn"),
      resetStorageBtn: document.getElementById("reset-storage-btn"),
      quizModal: document.getElementById("quiz-result-modal"),
      quizResultLine1: document.getElementById("quiz-result-line1"),
      quizResultLine2: document.getElementById("quiz-result-line2"),
      quizCloseBtn: document.getElementById("quiz-close-btn")
    };

    function initAssetFallbacks() {
      const images = document.querySelectorAll("img.asset-img[data-fallback-id]");
      images.forEach((img) => {
        const fallbackId = img.getAttribute("data-fallback-id");
        const fallback = document.getElementById(fallbackId);
        if (!fallback) return;

        img.addEventListener("load", () => {
          fallback.classList.add("hidden");
        });
        img.addEventListener("error", () => {
          img.style.display = "none";
          fallback.classList.remove("hidden");
        });

        if (img.complete) {
          if (img.naturalWidth > 0) {
            fallback.classList.add("hidden");
          } else {
            img.style.display = "none";
            fallback.classList.remove("hidden");
          }
        }
      });
    }

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function safeLoad(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return fallback;
        const parsed = JSON.parse(raw);
        if (Array.isArray(fallback)) return Array.isArray(parsed) ? parsed : fallback;
        return Object.assign({}, fallback, parsed);
      } catch (_) {
        return fallback;
      }
    }

    function saveStorage(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function normalizeWords(raw) {
      return raw
        .filter((item) => item && typeof item.szo === "string" && (item.helyes_betu === "j" || item.helyes_betu === "ly"))
        .map((item, idx) => Object.assign({}, item, { _id: item.evfolyam + "-" + item.szo + "-" + idx }));
    }

    const allWords = normalizeWords(window.szavak || []);
    const availableLevels = [...new Set(allWords.map((w) => Number(w.evfolyam)).filter((v) => Number.isFinite(v)))].sort((a, b) => a - b);

    function getWordsForLevel(level) {
      return allWords.filter((w) => Number(w.evfolyam) === Number(level));
    }

    function setFeedback(text, type = "neutral") {
      els.feedback.textContent = text;
      els.feedback.classList.remove("feedback-good", "feedback-bad");
      if (type === "good") els.feedback.classList.add("feedback-good");
      if (type === "bad") els.feedback.classList.add("feedback-bad");
    }

    function getTodayISO() {
      return new Date().toISOString().slice(0, 10);
    }

    function dayDiff(fromISO, toISO) {
      const from = new Date(fromISO + "T00:00:00");
      const to = new Date(toISO + "T00:00:00");
      return Math.round((to - from) / 86400000);
    }

    function touchStreak() {
      const today = getTodayISO();
      const last = state.progress.lastPlayedDate;
      if (!last) {
        state.progress.streakDays = 1;
      } else {
        const diff = dayDiff(last, today);
        if (diff === 1) state.progress.streakDays += 1;
        else if (diff > 1) state.progress.streakDays = 1;
      }
      state.progress.lastPlayedDate = today;
      state.progress.bestStreak = Math.max(state.progress.bestStreak || 0, state.progress.streakDays || 0);
      saveStorage(STORAGE_KEYS.progress, state.progress);
    }

    function prepareLevel(level) {
      state.currentLevel = level;
      state.levelWords = shuffle(getWordsForLevel(level));
      state.levelPointer = 0;
      state.activePoolWords = [];
      state.activePoolRemaining = [];
      state.roundWords = [];
      state.currentQuestionIndex = 0;
    }

    function ensureActivePool() {
      if (state.activePoolRemaining.length > 0 || state.activePoolWords.length > 0) return;
      if (state.levelWords.length === 0) {
        state.levelWords = shuffle(getWordsForLevel(state.currentLevel));
        state.levelPointer = 0;
      }
      if (state.levelPointer >= state.levelWords.length) {
        state.levelWords = shuffle(getWordsForLevel(state.currentLevel));
        state.levelPointer = 0;
      }
      const end = Math.min(state.levelPointer + POOL_SIZE, state.levelWords.length);
      const nextPool = state.levelWords.slice(state.levelPointer, end);
      state.levelPointer = end;
      state.activePoolWords = shuffle(nextPool);
      state.activePoolRemaining = [...state.activePoolWords];
    }

    function buildRoundWords() {
      ensureActivePool();
      const size = Math.min(ROUND_SIZE, state.activePoolRemaining.length);
      state.roundWords = state.activePoolRemaining.slice(0, size);
      state.activePoolRemaining = state.activePoolRemaining.slice(size);
      state.currentQuestionIndex = 0;
      state.roundCorrect = 0;
    }

    function splitWord(word, letter) {
      const idx = word.indexOf(letter);
      if (idx < 0) return { prefix: word, suffix: "" };
      return { prefix: word.slice(0, idx), suffix: word.slice(idx + letter.length) };
    }

    function getCurrentWord() {
      return state.roundWords[state.currentQuestionIndex] || null;
    }

    function updateHeader() {
      els.modeBadge.textContent = state.mode === "quiz" ? "Mód: Kvíz" : "Mód: Játék";
      els.levelBadgeText.textContent = state.currentLevel + ". osztály";
      els.scoreBadgeText.textContent = (state.progress.totalPoints || 0) + " pont";
      els.streakBadgeText.textContent = (state.progress.streakDays || 0) + " sorozat";
      els.backToGameBtn.disabled = state.mode !== "quiz";
      els.newRoundBtn.disabled = state.locked || state.mode === "quiz";
      els.quizBtn.disabled = state.locked || state.mode === "quiz";
      els.levelSelect.disabled = state.locked || state.mode === "quiz";
      els.ageModeSelect.disabled = state.locked || state.mode === "quiz";
      els.resetStorageBtn.disabled = state.locked;
    }

    function updateCounters() {
      const total = state.roundWords.length || ROUND_SIZE;
      const shownCurrent = Math.min(state.currentQuestionIndex + 1, total);
      const pointsNow = state.mode === "quiz" ? state.quizCorrect : state.score;
      els.score.textContent = "⭐ Pontjaid: " + pointsNow + " / " + total;
      els.progress.textContent = "Kérdés: " + shownCurrent + "/" + total;
      els.combo.textContent = "Hibátlan sorozat: " + state.combo;
      const fill = total > 0 ? (Math.min(state.currentQuestionIndex, total) / total) * 100 : 0;
      els.progressFill.style.width = fill + "%";
    }

    function applyAgeMode() {
      const btnSize = state.settings.ageMode === "kids" ? "98px" : "84px";
      els.btnJ.style.minHeight = btnSize;
      els.btnLy.style.minHeight = btnSize;
    }

    function renderWord() {
      const word = getCurrentWord();
      if (!word) {
        els.wordPrefix.textContent = "";
        els.missingLetter.textContent = "_";
        els.wordSuffix.textContent = "";
        return;
      }
      const parts = splitWord(word.szo, word.helyes_betu);
      els.wordPrefix.textContent = parts.prefix;
      els.missingLetter.textContent = "_";
      els.wordSuffix.textContent = parts.suffix;
      els.missingLetter.classList.remove("shake", "word-pop");
    }

    function render() {
      updateHeader();
      updateCounters();
      renderWord();
      saveStorage(STORAGE_KEYS.session, {
        currentLevel: state.currentLevel,
        mode: state.mode,
        score: state.score,
        combo: state.combo
      });
    }

    function setButtonsDisabled(disabled) {
      els.btnJ.disabled = disabled;
      els.btnLy.disabled = disabled;
      state.locked = disabled;
      updateHeader();
    }

    function fireConfetti() {
      const colors = ["#4DA6FF", "#4CD964", "#FFB020", "#FF4D4F", "#1E88E5"];
      for (let i = 0; i < 28; i += 1) {
        const piece = document.createElement("span");
        piece.className = "confetti";
        piece.style.left = (Math.random() * 100) + "vw";
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (1.0 + Math.random() * 0.9) + "s";
        piece.style.opacity = String(0.75 + Math.random() * 0.25);
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 2200);
      }
    }

    function animateWrong(selected, btnEl) {
      els.missingLetter.textContent = selected;
      els.missingLetter.classList.add("shake");
      btnEl.classList.add("wrong", "shake");
      setTimeout(() => {
        btnEl.classList.remove("wrong", "shake");
        els.missingLetter.classList.remove("shake");
        els.missingLetter.textContent = "_";
      }, 450);
    }

    function animateCorrect(letter, btnEl) {
      els.missingLetter.textContent = letter;
      els.missingLetter.classList.add("word-pop");
      btnEl.classList.add("correct");
      setTimeout(() => {
        btnEl.classList.remove("correct");
        els.missingLetter.classList.remove("word-pop");
      }, 330);
    }

    function moveNextQuestion() {
      state.currentQuestionIndex += 1;
      if (state.currentQuestionIndex >= state.roundWords.length) {
        if (state.mode === "quiz") {
          finishQuiz();
          return;
        }

        const byGrade = state.progress.byGrade || {};
        if (!byGrade[state.currentLevel]) byGrade[state.currentLevel] = { rounds: 0, correct: 0 };
        byGrade[state.currentLevel].rounds += 1;
        byGrade[state.currentLevel].correct += state.roundCorrect;
        state.progress.byGrade = byGrade;
        saveStorage(STORAGE_KEYS.progress, state.progress);

        setFeedback("Kör vége. Indíthatsz új 10 szavas kört.", "good");
        render();
        return;
      }

      setFeedback("Melyik betű hiányzik?");
      render();
      setButtonsDisabled(false);
    }

    function onAnswer(selected) {
      if (state.locked) return;
      const word = getCurrentWord();
      if (!word) return;
      const correct = word.helyes_betu;
      const selectedBtn = selected === "j" ? els.btnJ : els.btnLy;

      if (state.mode === "quiz") {
        setButtonsDisabled(true);
        if (selected === correct) {
          state.quizCorrect += 1;
          setFeedback("Helyes!", "good");
        } else {
          setFeedback("Hibás. A helyes betű: " + correct, "bad");
        }
        animateCorrect(correct, correct === "j" ? els.btnJ : els.btnLy);
        updateCounters();
        setTimeout(() => {
          setButtonsDisabled(false);
          moveNextQuestion();
        }, 900);
        return;
      }

      if (selected === correct) {
        setButtonsDisabled(true);
        state.score += 1;
        state.roundCorrect += 1;
        state.combo += 1;
        state.progress.totalPoints = (state.progress.totalPoints || 0) + 1;
        saveStorage(STORAGE_KEYS.progress, state.progress);

        animateCorrect(correct, selectedBtn);
        fireConfetti();
        setFeedback("Ügyes vagy!", "good");
        updateCounters();

        setTimeout(() => {
          setButtonsDisabled(false);
          moveNextQuestion();
        }, 820);
      } else {
        state.combo = 0;
        setFeedback("Ez most nem jó. Próbáld újra!", "bad");
        animateWrong(selected, selectedBtn);
        updateCounters();
      }
    }

    function startNewGameRound() {
      if (state.locked) return;
      state.mode = "game";
      if (state.activePoolRemaining.length === 0 && state.activePoolWords.length > 0) {
        state.activePoolWords = [];
      }

      buildRoundWords();
      if (state.roundWords.length === 0) {
        setFeedback("Nincs elérhető szó ebben a körben.", "bad");
        render();
        return;
      }

      state.score = 0;
      setFeedback("Melyik betű hiányzik?");
      setButtonsDisabled(false);
      render();
    }

    function startQuiz() {
      if (state.locked) return;
      state.mode = "quiz";
      ensureActivePool();
      const source = state.activePoolWords.length ? state.activePoolWords : state.levelWords;
      state.roundWords = shuffle(source).slice(0, Math.min(ROUND_SIZE, source.length));
      state.currentQuestionIndex = 0;
      state.quizCorrect = 0;

      if (state.roundWords.length === 0) {
        setFeedback("Nem indítható kvíz: nincs szó.", "bad");
        state.mode = "game";
      } else {
        setFeedback("Kvíz mód: nincs újrapróba, minden válasz számít.");
      }

      setButtonsDisabled(false);
      render();
    }

    function finishQuiz() {
      const total = state.roundWords.length || 1;
      const percent = Math.round((state.quizCorrect / total) * 100);
      const message = percent >= 90 ? "Kiemelkedő eredmény!" : (percent < 60 ? "Gyakoroljunk még egy kicsit!" : "Szép munka!");

      els.quizResultLine1.textContent = "Eredmény: " + state.quizCorrect + "/" + total + " (" + percent + "%)";
      els.quizResultLine2.textContent = message;

      const hist = safeLoad(STORAGE_KEYS.quizHistory, []);
      hist.unshift({ date: getTodayISO(), level: state.currentLevel, correct: state.quizCorrect, total: total, percent: percent });
      saveStorage(STORAGE_KEYS.quizHistory, hist.slice(0, 20));

      els.quizModal.classList.add("show");
      els.quizModal.setAttribute("aria-hidden", "false");
      setButtonsDisabled(true);
    }

    function closeQuizModalAndReturn() {
      els.quizModal.classList.remove("show");
      els.quizModal.setAttribute("aria-hidden", "true");
      state.mode = "game";
      state.roundWords = [];
      state.currentQuestionIndex = 0;
      setButtonsDisabled(false);
      startNewGameRound();
    }

    function renderLevelOptions() {
      els.levelSelect.innerHTML = "";
      availableLevels.forEach((level) => {
        const opt = document.createElement("option");
        opt.value = String(level);
        opt.textContent = level + ". évfolyam";
        els.levelSelect.appendChild(opt);
      });
      els.levelSelect.value = String(state.currentLevel);
    }

    function resetStorage() {
      localStorage.removeItem(STORAGE_KEYS.settings);
      localStorage.removeItem(STORAGE_KEYS.progress);
      localStorage.removeItem(STORAGE_KEYS.session);
      localStorage.removeItem(STORAGE_KEYS.quizHistory);
      location.reload();
    }

    function initFromStorage() {
      state.settings = safeLoad(STORAGE_KEYS.settings, state.settings);
      state.progress = safeLoad(STORAGE_KEYS.progress, state.progress);
      const session = safeLoad(STORAGE_KEYS.session, {});

      const initialLevel = Number(state.settings.selectedGrade || session.currentLevel || availableLevels[0] || 1);
      prepareLevel(initialLevel);
      touchStreak();

      renderLevelOptions();
      els.ageModeSelect.value = state.settings.ageMode;
      applyAgeMode();
    }

    function init() {
      if (!Array.isArray(window.szavak) || window.szavak.length === 0) {
        setFeedback("A szólista nem tölthető be.", "bad");
        return;
      }
      initAssetFallbacks();
      initFromStorage();
      startNewGameRound();
    }

    els.btnJ.addEventListener("click", () => onAnswer("j"));
    els.btnLy.addEventListener("click", () => onAnswer("ly"));
    els.newRoundBtn.addEventListener("click", startNewGameRound);
    els.quizBtn.addEventListener("click", startQuiz);

    els.levelSelect.addEventListener("change", (event) => {
      const nextLevel = Number(event.target.value);
      if (!Number.isFinite(nextLevel)) return;
      state.settings.selectedGrade = nextLevel;
      saveStorage(STORAGE_KEYS.settings, state.settings);
      state.mode = "game";
      state.score = 0;
      state.combo = 0;
      prepareLevel(nextLevel);
      setFeedback(nextLevel + ". évfolyam kiválasztva.", "good");
      startNewGameRound();
    });

    els.ageModeSelect.addEventListener("change", (event) => {
      state.settings.ageMode = event.target.value;
      saveStorage(STORAGE_KEYS.settings, state.settings);
      applyAgeMode();
    });

    els.backToGameBtn.addEventListener("click", () => {
      if (state.mode !== "quiz") return;
      state.mode = "game";
      state.roundWords = [];
      state.currentQuestionIndex = 0;
      setFeedback("Visszaléptél játék módba.");
      startNewGameRound();
    });

    els.resetStorageBtn.addEventListener("click", resetStorage);
    els.quizCloseBtn.addEventListener("click", closeQuizModalAndReturn);
    els.quizModal.addEventListener("click", (event) => {
      if (event.target === els.quizModal) closeQuizModalAndReturn();
    });

    init();
  </script>
</body>
</html>
